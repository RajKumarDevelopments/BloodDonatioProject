<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-row>
      <ion-col size="2"routerLink="/home"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>
      <ion-col size="8">
        <ion-title>Blood Request</ion-title>
      </ion-col>
      <ion-col size="2">
        <!--<ion-buttons>
          <ion-menu-button></ion-menu-button>
        </ion-buttons>-->
      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-header>

<ion-content>
  <br />
  <ion-row>
    <ion-col size="12">
      <h3>M. Venkat</h3>
    </ion-col>
  </ion-row>
  <ion-item>
    <ion-icon name="medkit-outline" slot="start"></ion-icon>
    <ion-label>
      <h6>Hospital Name</h6>
      <p>Kamineni Hospital</p>
    </ion-label>
  </ion-item>
  <ion-item>
    <ion-icon name="person-outline" slot="start"></ion-icon>
    <ion-label>
      <h6>Contact Name</h6>
      <p>M. Venkat</p>
    </ion-label>
  </ion-item>
  <ion-item>
    <ion-icon name="call-outline" slot="start"></ion-icon>
    <ion-label>
      <h6>Contact Number</h6>
      <p>+1234567890</p>
    </ion-label>
  </ion-item>
  <ion-item>
    <ion-icon name="water-outline" slot="start"></ion-icon>
    <ion-label>
      <h6>Blood Group</h6>
      <p>AB+</p>
    </ion-label>
  </ion-item>
  <ion-item>
    <ion-icon name="calendar-outline" slot="start"></ion-icon>
    <ion-label>
      <h6>Age</h6>
      <p>21</p>
    </ion-label>
  </ion-item>
  <ion-item>
    <ion-icon name="alert-circle-outline" slot="start"></ion-icon>
    <ion-label>
      <h6>Reason</h6>
      <p>Emergency surgery</p>
    </ion-label>
  </ion-item>
  <ion-row>
    <ion-col size="12">
      <button>Click here to donate</button>
    </ion-col>
    <ion-col size="4">
      <div class="round">
        <ion-icon name="location-outline"></ion-icon>
      </div>
    </ion-col>
    <ion-col size="4">
      <div class="round"style="background-color:dodgerblue">
        <ion-icon name="call-outline"></ion-icon>
      </div>
    </ion-col>
    <ion-col size="4">
      <div class="round"style="background-color:forestgreen">
        <ion-icon name="logo-whatsapp"></ion-icon>
      </div>
    </ion-col>

  </ion-row>
</ion-content>
