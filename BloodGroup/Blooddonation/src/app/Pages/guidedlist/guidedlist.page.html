<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-row>
      <ion-col size="2" (click)="back(myval)"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>
      <ion-col size="8">
        <ion-title> {{myval1}}</ion-title>
      </ion-col>
      <ion-col size="2">
        <!--<ion-buttons>
          <ion-menu-button></ion-menu-button>
        </ion-buttons>-->
      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-header>

  <ion-row *ngIf="myval=='EligibilityCriteria'" class="ion-padding-top">
    <ng-container *ngFor="let faq of EligibilityCriteria; let i = index">
      <!--<div [innerHTML]="cancerInfo"></div>-->
      <div class="bg">
        <details *ngIf="openIndex !== i">
          <summary (click)="toggleAccordion(i, EligibilityCriteria)" [ngClass]="{ 'bold-text': openIndex === i }">
            {{ faq.question }}
          </summary>
        </details>
        <details open *ngIf="openIndex === i">
          <summary (click)="toggleAccordion(i, EligibilityCriteria)" [ngClass]="{ 'bold-text': openIndex === i }">
            {{ faq.question }}
          </summary>
          <div>
            <!--{{ faq.answer }}-->
            <span [innerHTML]="getSafeHtml(faq.answer)"></span>
          </div>
        </details>
      </div>

    </ng-container>
  </ion-row>
