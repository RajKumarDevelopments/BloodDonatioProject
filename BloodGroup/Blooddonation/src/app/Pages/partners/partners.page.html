<ion-header [translucent]="true">
  <ion-toolbar>
    <div class="headerhight">
  <ion-row class="headerw-100">
    <ion-col size="2" routerLink="/home"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>
    <ion-col size="8">
      <ion-title>PARTNERS</ion-title>
    </ion-col>
    <ion-col size="2">
      <!--<ion-buttons>
        <ion-menu-button></ion-menu-button>
      </ion-buttons>-->
    </ion-col>
  </ion-row>
      </div>
</ion-toolbar>
</ion-header>

<ion-content>
  <div class="class_space">




    <div class="item_center">
      <img src="../../../assets/Images/bg_logo.png" />
    </div>


  </div>

</ion-content>
<ion-footer>
  <button expand="full" class="red-button"id="open-modal" ripple>Become a Partner</button><br />
  <ion-modal #modal trigger="open-modal" [initialBreakpoint]="0.75" [breakpoints]="[0, 1]">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button class="button1" (click)="modal.dismiss()">Close</ion-button>
          </ion-buttons>
          <ion-buttons slot="end">
            <ion-button class="button1" (click)="modal.dismiss()">Okay</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-row>
        <ion-col size="12">
          <h5>Our Partner...</h5>
          <div class="partner">Add a valid phone number and the reason you wabt to be partner </div>
          <div class="items_center" style="height: 3rem;">
            <ion-icon name="call-outline" class="input_icon"></ion-icon>
            <input type="tel" [(ngModel)]="Phonenumber" placeholder="Enter Phone No" class="input_field" />
          </div>
          <br />
          <div class="partnerss">Message</div>
          <div class="items_center">
            <textarea [(ngModel)]="Message"></textarea>
          </div>
           <br />
          <!-- <div class="items_centerss"> -->
          <div class="">
            <button expand="full" class="buttonalign red-button red-btns" ripple (click)="sendmail()">Send</button><br />
          </div>
        </ion-col>
      </ion-row>
    </ng-template>
      
  </ion-modal>
</ion-footer>
