<ion-header [translucent]="true" style="box-shadow:none">
  <ion-toolbar>
    <ion-row>
      <ion-col size="2"routerLink="/needblood"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>
      <ion-col size="8">
        <ion-title>SEARCH DONORS</ion-title>
      </ion-col>
      <ion-col size="2">
      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-header>

<ion-content>


  <br />
  <ion-item id="open-modal">
    <ion-label>Blood type</ion-label>
    <ion-icon name="add-circle-outline" slot="end" style="color:red" *ngIf="selectedBloodType == null  || selectedBloodType =='' "></ion-icon>
    <div class="regright" *ngIf="selectedBloodType != null  || selectedBloodType !='' ">{{selectedBloodType}}</div>
  </ion-item>
  <ion-modal #modal4 trigger="open-modal" [initialBreakpoint]="0.75" [breakpoints]="[0, 1]">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button class="button1" (click)="modal4.dismiss()">Close</ion-button>
          </ion-buttons>
          <ion-buttons slot="end">
            <ion-button class="button1" (click)="reg()">Confirm</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-list>
        <ng-container *ngFor="let obj of BloodGroups">
          <ion-item  *ngIf="obj.Status == 1">
            <ion-label (click)="selectBloodGroup(obj)">{{obj.BLGName}}</ion-label>
          </ion-item>
        </ng-container>
      </ion-list>


 
    </ng-template>
  </ion-modal>

    <div class="col-lg-5">
      <ion-label>Enter Pincode</ion-label>

      <ion-input class="regright" [(ngModel)]="selectedPincode"></ion-input>

  <ion-item>
    <div class="col-lg-5 w-50">
      <ion-label>Enter Pincode</ion-label>
    </div>
    <div class="col-lg-7 w-50">
      <ion-input class="regright"
                 type="tel"
                 [(ngModel)]="selectedPincode"
                 maxlength="6"
                 inputmode="numeric"
                 pattern="[0-9]*"
                 (ionInput)="validatePincode($event)">
      </ion-input>
    </div>
  </ion-item>


  <ion-modal #modal4 trigger="open-modal4" [initialBreakpoint]="0.75" [breakpoints]="[0, 1]">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button class="button1" (click)="reg()">Close</ion-button>
          </ion-buttons>
          <ion-buttons slot="end">
            <ion-button class="button1" (click)="reg()">Okay</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-searchbar placeholder="Search Pincode" [(ngModel)]="searchPincode" (ionInput)="SearchPincodes()"></ion-searchbar>
      <ion-list>
        <ion-item class="centered-text" *ngFor="let obj of Pincodes">
          <div (click)="selectPincode(obj)">{{obj.Pincode}}</div>
        </ion-item>
      </ion-list>
    </ng-template>
  </ion-modal>

</ion-content>
<ion-footer>
  <ion-row>
    <ion-col size="4"><button expand="full" class="button-pushable" role="button" ripple (click)="Clear()">
  <span class="button-shadow"></span>
  <span class="button-edge"></span>
  <span class="button-front text">
    Clear
  </span>
</button>
    </ion-col>
    <ion-col size="4">

      <button expand="full" class="button-pushable" role="button" ripple (click)="GotoDonors()">
  <span class="button-shadow"></span>
  <span class="button-edge"></span>
  <span class="button-front text">
    Close
  </span>
</button>

    </ion-col>
    <ion-col size="4"><button expand="full" class="button-pushable" role="button" ripple (click)="ApplyFilter()">
        <span class="button-shadow"></span>
  <span class="button-edge"></span>
  <span class="button-front text">
    Apply
  </span>
       </button></ion-col>
  </ion-row>
</ion-footer>
<style>
  .sc-ion-searchbar-md-h {
    --background: var(--ion-background-color, #fff);
    --border-radius: 20px;
    --box-shadow: 0 2px 2px 0 rgba(0, 0, 0, 0.14), 0 3px 1px -2px rgba(0, 0, 0, 0.2), 0 1px 5px 0 rgba(0, 0, 0, 0.12);
    --cancel-button-color: var(--ion-color-step-900, var(--ion-text-color-step-100, #1a1a1a));
    --clear-button-color: initial;
    --color: var(--ion-color-step-850, var(--ion-text-color-step-150, #262626));
    --icon-color: var(--ion-color-step-600, var(--ion-text-color-step-400, #666666));
    -webkit-padding-start: 8px;
    padding-inline-start: 8px;
    -webkit-padding-end: 8px;
    padding-inline-end: 8px;
    padding-top: 8px;
    padding-bottom: 8px;
    background: inherit;
  }
</style>
