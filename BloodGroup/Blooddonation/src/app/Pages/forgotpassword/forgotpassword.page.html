<ion-header [translucent]="true" style="box-shadow:none">
  <ion-toolbar>
    <ion-row>
      <ion-col size="2">
        <ion-icon name="chevron-back-outline"style="padding:0"></ion-icon>
      </ion-col>
      <ion-col size="10">Forgotpassword</ion-col>
    </ion-row>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-row>
    <ion-col size="12">
      <div class="items_center">
        <p>Fill in the email address and set a new password and we'll send you a link to confirm your new password</p>
      </div>
    </ion-col>
    <ion-col size="12">
      <div class="form_container">
        <div class="items_center">
          <ion-icon name="mail-outline" class="input_icon"></ion-icon>
          <input type="text" placeholder=" Email" class="input_field" />
        </div>
        <div class="items_center">
          <ion-icon name="lock-closed-outline" class="input_icon"></ion-icon>
          <input type="password" placeholder="Your new password" class="input_field" />
          <ion-icon name="eye-outline" class=" eye_icon"></ion-icon>
        </div>
      </div>
    </ion-col>
  </ion-row>
</ion-content>
<ion-footer>
  <div class="items_center">
    <button>Send</button>
  </div>
</ion-footer>
<style>
  .footer-md {
    -webkit-box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.2), 0 4px 5px 0 rgba(0, 0, 0, 0.14), 0 1px 10px 0 rgba(0, 0, 0, 0.12);
    box-shadow: none;
  }
</style>
