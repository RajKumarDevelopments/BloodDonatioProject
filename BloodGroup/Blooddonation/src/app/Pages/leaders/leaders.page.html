<ion-header [translucent]="true">
  <ion-toolbar>
    <div class="headerhight">
      <ion-row class="headerw-100">
        <ion-col size="2" routerLink="/joincampaign"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>
        <ion-col size="8">
          <ion-title>{{ titleText }}</ion-title>
        </ion-col>
        <ion-col size="2">

        </ion-col>
      </ion-row>
      </div>
</ion-toolbar>
</ion-header>


<ion-content>
  <ion-row>
    <ion-col size="1"> </ion-col>
    <ion-col size="10">
      <img src="../../../assets/Images/Capture.PNG" class="imgg" />
    </ion-col>
    <ion-col size="1"> </ion-col>


    
  </ion-row>

  <div class="vertical-center-wrapper">
    <ion-row>
      <ion-col size="12" *ngIf="status">
        <div class="cards" (click)="AddDonor()">
          <ion-row>
            <ion-col size="2" class="icon_img">
              <img src="../../../assets/client shared icons/Add a Donor.png" class="icon_imgs" />
            </ion-col>
            <ion-col size="10">
              <ion-label class="head1 Arial font29" style="font-size: 13px !important;">Add a donors</ion-label>
              <p class="Arial font24 gray" style="font-size: 11px !important;">Help family, friends, or non-readers</p>
            </ion-col>
          </ion-row>
        </div>
      </ion-col>
      <ion-col size="12">
        <div class="cards" (click)="back(2)">
          <ion-row>
            <ion-col size="2" class="icon_img">
              <img src="../../../assets/client shared icons/Organise a presentation.png" class="icon_imgs" />
            </ion-col>
            <ion-col size="10">
              <ion-label class="head1 Arial font29" style="font-size: 13px !important;">Organise a presentation</ion-label>
              <p class="Arial font24 gray" style="font-size: 11px !important;">Host a Life-Changing Session for Your Team</p>
            </ion-col>
          </ion-row>
        </div>
      </ion-col>
    </ion-row>
  </div>



 
</ion-content>

<div class="footer_content" style="background-color: #ffffff;">
  <ion-row class="row_footer">
     
    <ion-col size="12">
      <div class="footer_card" routerLink="/donorguide">
        <ion-row>
          <ion-col size="2" class="icon_img">
            <img src="../../../assets/client images/All Icons/Guide.png" />
          </ion-col>
          <ion-col size="10" class="footer_label_col">
            <ion-label class="footer_label" style="font-weight:bold">Guide</ion-label>
            <p>Understand what a user can do</p>
          </ion-col>
        </ion-row>
      </div>
    </ion-col>
    
  </ion-row>
</div>
