<ion-header>
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-row class="ion-align-items-center">
        <ion-col size="1" *ngIf="id==1" (click)="back(1)"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>
        <ion-col size="1" *ngIf="id==3" (click)="back(4)"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>
        <ion-col size="11" *ngIf="id==1 || id==2">
          <ion-title>REQUEST A PRESENTATION</ion-title>
        </ion-col>
        <ion-col size="11" *ngIf="id==3 || id==4">
          <ion-title>ORGANISE A PRESENTATION</ion-title>
        </ion-col>
      </ion-row>
    </ion-toolbar>
  </ion-header>
</ion-header>
<ion-content>
  <ion-row>
    <ion-col size="12">
      <div class="center imgg">
        <div class="card">
          <h4>Choose an venue location</h4>
        </div>
      </div>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col size="12" class="cls">
      <ion-searchbar class="search animated fadeInDown"
                     [ngModelOptions]="{standalone: true}"
                     [(ngModel)]="searchQuery"
                     (ionInput)="onSearchInput()"
                     style="padding: 2% 0%;"
                     search-icon="pin"
                     debounce="300"
                     placeholder="Search for a location">
      </ion-searchbar>
      <ion-list *ngIf="predictions?.length">
        <ion-item *ngFor="let prediction of predictions" class="f-12" (click)="selectPrediction(prediction)">
          {{ prediction.description }}
        </ion-item>
      </ion-list>
      <div class="map-wrapper">
        <div #map id="map"></div>
      </div>
    </ion-col>
    <ion-col size="12">
      <ion-item id="open-modal1">
        <ion-label label="State" placeholder="" readonly style="width:50%!important">State</ion-label>
        <ion-input [value]="selectedState" class="regright ion-text-end"readonly fill="none" *ngIf="selectedState"></ion-input>
      </ion-item>

      <ion-item id="open-modal2">
        <ion-label label="District" placeholder="" readonly style="width:50%!important">District</ion-label>
        <ion-input [value]="selectedDistrict" class="regright ion-text-end"readonly *ngIf="selectedDistrict"></ion-input>
      </ion-item>

      <ion-item id="open-modal3">
        <ion-label label="City" placeholder="" readonly style="width:50%!important">City</ion-label>
        <ion-input [value]="selectedCity" class="regright ion-text-end"readonly *ngIf="selectedCity"></ion-input>
      </ion-item>
    </ion-col>
  </ion-row>
</ion-content>
<div class="footer_content" style="background-color: #ffffff;">
  <ion-row class="ion-justify-content-center">
    <ion-col size="12">
      <div class="footer_card1" (click)="nxt(1)">
        <ion-row>
          <ion-col size="2" class="icon_img">
            <img src="../../../assets/client images/All Icons/Post a Blood request.png" />
          </ion-col>
          <ion-col size="10" class="footer_label_col">
            <ion-label class="footer_label">Next</ion-label>
          </ion-col>
        </ion-row>
      </div>
    </ion-col>
  </ion-row>
</div>
