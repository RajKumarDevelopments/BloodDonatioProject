<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-row class="ion-align-items-center">
      <ion-col size="1"  routerLink="/leaders"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>

      <ion-col size="11">
        <ion-title>ORGANISE A PRESENTATION</ion-title>
      </ion-col>

    </ion-row>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-row>
    <ion-col size="12">
      <div class="center imgg">
        <div class="card">
          <h4>Choose an option below</h4>
        </div>
      </div>
    </ion-col>
  </ion-row>
  <br />
  <ion-row class="row-spacing" >
    <ion-col size="12" *ngIf="status">
      <div class="cards" (click)="routing(3)">
        <ion-row>
          <ion-col size="2" class="icon_img">
            <img src="../../../assets/client shared icons/Search Donor.png" class="icon_imgs" />
          </ion-col>
          <ion-col size="10">
            <ion-label class="head1 " style="font-size: 13px !important;">Conduct a Presentation </ion-label>
            <p class="gray" style="font-size: 12px !important;">Find out if your eligbile to donate </p>
          </ion-col>


        </ion-row>
      </div>
    </ion-col>

    <ion-col size="12">
      <div class="cards" (click)="routing(4)">
        <ion-row>
          <ion-col size="2" class="icon_img">
            <img src="../../../assets/client shared icons/Request for Blood.png" class="icon_imgs" />
          </ion-col>
          <ion-col size="10">
            <ion-label class="head1 " style="font-size: 13px !important;">Presentations Near You</ion-label>
            <p class="gray" style="font-size: 12px !important;">Find out if your eligbile to donate </p>
          </ion-col>


        </ion-row>
      </div>
    </ion-col>

  </ion-row>


</ion-content>



<div class="footer_content" >
  <ion-row>
    <ion-col size="2.4">
      <div class="border" routerLink="/home">
        <ion-icon name="home-outline" class="tabs_icon"></ion-icon>
        <div class="tabs_title">Home</div>
      </div>

    </ion-col>
    <ion-col size="2.4">
      <div class="border" routerLink="/needblood">
        <!--<ion-icon name="person-outline" class="tabs_icon" style="color:white;font-size: 25px;"></ion-icon>-->
        <img class="ficons_white" src="../../../assets/client images/All Icons/Home page Icons/Donatenowwhite.png" />
        <div class="tabs_title">Find Donor</div>
      </div>

    </ion-col>
    <ion-col size="2.4">
      <div class="border" routerLink="/joincampaign" style="background-color:#a9b5cb;border:none">
        <!--<ion-icon name="hand-right-outline" class="tabs_icon"></ion-icon>-->
        <img class="ficons" src="../../../assets/client images/All Icons/Home page Icons/joincampaign.png" />
        <div class="tabs_title"></div>
      </div>
    </ion-col>
    <ion-col size="2.4" routerLink="/donorssearch">
      <div class="border">
        <!--<ion-icon name="egg-outline" class="tabs_icon"></ion-icon>-->
        <img class="ficons" src="../../../assets/client images/All Icons/Home page Icons/Donate now.png" />

        <div class="tabs_title">Donate Now</div>
      </div>

    </ion-col>
    <ion-col size="2.4" routerLink="/letshlpgallerry">
      <div class="border">
        <!--<ion-icon name="images-outline" class="tabs_icon"></ion-icon>-->
        <img class="ficons" src="../../../assets/client images/All Icons/Home page Icons/Gallery.png" />
        <div class="tabs_title">Gallery</div>
      </div>

    </ion-col>
  </ion-row>
</div>
