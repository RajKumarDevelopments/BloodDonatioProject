<ion-header [translucent]="true">
  <ion-toolbar style="background-color: #f1f2f6;">
    <ion-row>
      <ion-col size="2" routerLink="/leaders"><ion-icon name="chevron-back-outline"></ion-icon></ion-col>
      <ion-col size="8">
        <ion-title> Hospitals </ion-title>
      </ion-col>
      <ion-col size="2">
        <!--<ion-buttons>
        <ion-menu-button></ion-menu-button>
      </ion-buttons>-->
      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list >
    <ion-item *ngFor="let hospital of hspatals">
      <ion-label>
        <ion-row>
          <ion-col size="6">
            <ion-label>{{hospital.HospitalName}}</ion-label>
          </ion-col>
          <ion-col size="6">
            <ion-label>{{hospital.HospitalAddress}}</ion-label>
          </ion-col>
        </ion-row>
      </ion-label>
    </ion-item>    
  </ion-list>
  
  
</ion-content>
<ion-footer >
  <ion-fab (click)="next()">
    <ion-fab-button style="position: fixed; bottom: 16px; right: 16px;">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-footer>
