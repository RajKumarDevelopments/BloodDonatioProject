<ion-content >
  <ion-header [translucent]="true" style="height: 50px;box-shadow:none; border-bottom: 1px solid #d3d3d363;background-color:white">
    <ion-toolbar>
      <ion-row>
        <ion-col size="4"> </ion-col>
        <ion-col size="4">
          <ion-title>PROFILE</ion-title>
        </ion-col>
        <ion-col size="2">
          <ion-icon name="notifications-outline" routerLink="/notifications" style="padding: 12px;"></ion-icon>
        </ion-col>
        <ion-col size="2">
          <ion-buttons class="ion-text-right">
            <ion-menu-button></ion-menu-button>
          </ion-buttons>
        </ion-col>
      </ion-row>
    </ion-toolbar>
  </ion-header>

  <div class="card">
    <ion-card-content>
      <ion-row class="name ">
        <ion-col size="5" class="text_center">
        </ion-col>
        <ion-col size="2" class="text_center">
          <b>Suraj</b>
        </ion-col>
        <ion-col size="5" class="text_end ">
          <ion-icon name="create-outline" style="font-size:20px"></ion-icon>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size="4" class="text_center">
          <div class="headder">You've got<br /><span>550</span> points</div>
        </ion-col>
        <ion-col size="4">
        </ion-col>
        <ion-col size="4" class="text_center ">
          <div class="headder"> Can donate from <span>Tomorrow</span> </div>
        </ion-col>
      </ion-row>
    </ion-card-content>
  </div>

  <ion-row class="imgrow">
    <ion-col size="3.5"> </ion-col>
    <ion-col size="5">
      <ion-card class="circular-card">
        <svg height="100px" width="100px" version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" xml:space="preserve" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path style="fill:#FFFFFF;" d="M256,503.999C119.034,503.999,8.001,392.966,8.001,256S119.033,8,256,8 s247.999,111.033,247.999,247.999C503.849,392.904,392.904,503.849,256,503.999z"></path> <path style="fill:#E2E2E2;" d="M256,16c132.549,0,240,107.451,240,240S388.549,496,256,496S16,388.549,16,256 C16.15,123.514,123.514,16.15,256,16 M256,0C114.615,0,0,114.615,0,256s114.615,256,256,256s256-114.615,256-256S397.384,0,256,0z"></path> <circle style="fill:#999999;" cx="255.989" cy="162.237" r="68.924"></circle> <path style="fill:#E21B1B;" d="M374.895,384v-61.032c0-64.224-70.104-65.4-70.104-65.4H207.2c0,0-70.104,0.8-70.104,65.4V384 H374.895z"></path> </g></svg>
      </ion-card>
    </ion-col>
    <ion-col size="3.5"> </ion-col>
    <ion-col size="5"></ion-col>
    <ion-col size="2"><div class="round">AB+</div></ion-col>
    <ion-col size="5"></ion-col>

  </ion-row>


  <ion-row style="padding:10px">
    <ion-col size="12">
      <div class="img_border">
        <img src="https://uknow.uky.edu/sites/default/files/styles/uknow_story_image/public/GettyImages-1363427062.jpg" />
      </div>
    </ion-col>
    <ion-col size="12">
      <div class="card1">
        <ion-card-content class="card-content">
          <ion-icon name="expand-outline" slot="start" class="card_icon"></ion-icon>
          <div class="item-content">
            <ion-label class="highlight">Register Donation</ion-label>
            <p>Scan the QR code or add a donation</p>
          </div>
        </ion-card-content>
      </div>
    </ion-col>
    <ion-col size="12">
      <div class="card1" routerLink="/signup">
        <ion-card-content class="card-content">
          <ion-icon name="person-add-outline" slot="start" class="card_icon"></ion-icon>
          <div class="item-content">
            <ion-label class="highlight">Invite Friends</ion-label>
            <p>Send your invite code to earn points</p>
          </div>
        </ion-card-content>
      </div>
    </ion-col>
    <ion-col size="12">
      <div class="card1">
        <ion-card-content class="card-content">
          <ion-icon name="help-buoy-outline" slot="start" class="card_icon"></ion-icon>
          <div class="item-content">
            <ion-label class="highlight">Support Let's help</ion-label>
            <p>Donate by ank transfer</p>
          </div>
        </ion-card-content>
      </div>
    </ion-col>
  </ion-row>

</ion-content>

<ion-footer style="background: #f0f0f0;box-shadow:none;border:none;padding:0">
  <ion-row>
    <ion-col size="2.5">
      <div class="border" style="background-color:red;border:none">
        <ion-icon name="home-outline" class="tabs_icon" style="color:white"></ion-icon>
      </div>
      <div class="tabs_title">Our<br />Home</div>
    </ion-col>
    <ion-col size="2.5">
      <div class="border" routerLink="/needblood">
        <ion-icon name="person-outline" class="tabs_icon"></ion-icon>
      </div>
      <div class="tabs_title">Need<br />Blood</div>
    </ion-col>
    <ion-col size="2.5">
      <div class="border" routerLink="/joincampaign">
        <ion-icon name="hand-right-outline" class="tabs_icon"></ion-icon>
      </div>
      <div class="tabs_title">Join<br />Campaign</div>
    </ion-col>
    <ion-col size="2.5"routerLink="/donatenow">
      <div class="border">
        <ion-icon name="egg-outline" class="tabs_icon"></ion-icon>
      </div>
      <div class="tabs_title">Donate<br /> Now</div>
    </ion-col>
    <ion-col size="2" routerLink="/letshlpgallerry">
      <div class="border" style="    margin-left: 0.1rem;">
        <ion-icon name="people-outline" class="tabs_icon"></ion-icon>
      </div>
      <div class="tabs_title">Let's help<br />gallery</div>
    </ion-col>
  </ion-row>
</ion-footer>
